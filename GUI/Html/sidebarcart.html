<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/x-icon" href="../Images/fashion.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!--=========================CSS==========================-->
    <link rel="stylesheet" href="../Css/gobal.css">
    <link rel="stylesheet" href="../Css/sidebarcart.css">

    <title>The Fox</title>
</head>

<body>
<!--=========================CART SIDEBAR==========================-->
    <div class="cart-overlay"></div>
    <section class="cart-sidebar">
        <!--=========================TOP==========================-->
        <div class="cart-top">
            <h2>
                Giỏ hàng
                <span class="cart-count">1</span>
            </h2>
            <button class="close-cart">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!--=========================PRODUCT LIST==========================-->
        <div class="cart-items">

            <!-- ITEM -->
            <div class="cart-item">
                <div class="cart-item-img">
                    <img src="../Images/sp1.jpg" alt="Product">
                </div>
                <div class="cart-item-info">
                    <h3> Áo kiểu Fox Summer</h3>
                    <p>
                        Màu:Hồng Pastel
                    </p>
                    <p>
                        Size:M
                    </p>
                    <div class="cart-item-quantity">
                        <button>-</button>
                        <input type="text" value="1">
                        <button>+</button>
                    </div>
                </div>
                <div class="cart-item-right">
                    <p class="cart-item-price"
                    data-price="790000">
                    790.000đ
                    </p>
                    <button class="cart-delete">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>

            <div class="cart-item">
                <div class="cart-item-img">
                    <img src="../Images/sp2.jpg" alt="Product">
                </div>
                <div class="cart-item-info">
                    <h3> Váy Fox Summer</h3>
                    <p>
                        Màu:Đỏ
                    </p>
                    <p>
                        Size: S
                    </p>
                    <div class="cart-item-quantity">
                        <button>-</button>
                        <input type="text" value="1">
                        <button>+</button>
                    </div>
                </div>
                <div class="cart-item-right">
                    <p class="cart-item-price"
                    data-price="690000">
                    690.000đ
                    </p>
                <button
                    class="cart-delete">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>
        <!--=========================BOTTOM==========================-->
        <div class="cart-bottom">
            <div class="cart-total">
                <h3>Tổng cộng</h3>
                <p class="cart-total-price">1.480.000đ</p>
            </div>
            <button class="view-cart">
                XEM GIỎ HÀNG
            </button>
        </div>
    </section>
</body>

<script src="../JS/sidebarcart.js"></script>

</html>
